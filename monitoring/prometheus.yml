global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - auth-service:8087

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - user-service:8088

  - job_name: catalog-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - catalog-service:8080

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - order-service:8080

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - payment-service:8080

  - job_name: messaging-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - messaging-service:8080

  - job_name: jobs-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - jobs-service:8080

  - job_name: delivery-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - delivery-service:8086
