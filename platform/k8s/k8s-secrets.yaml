# K8s Secrets for Agri Marketplace
# Apply with: kubectl apply -f k8s-secrets.yaml -n <namespace>
# IMPORTANT: These are development placeholder values.
# For production, use HashiCorp Vault or external-secrets operator.
---
apiVersion: v1
kind: Secret
metadata:
  name: agri-mongo-secret
type: Opaque
stringData:
  # Replace with your actual MongoDB connection string
  uri: "mongodb+srv://agri-user:CHANGE_ME_PROD_PASSWORD@cluster0.oavnlmy.mongodb.net/?retryWrites=true&w=majority&appName=Cluster0"
---
apiVersion: v1
kind: Secret
metadata:
  name: agri-jwt-secret
type: Opaque
stringData:
  # Valid 256-bit (64 hex char) key for HMAC-SHA256
  secret: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"
---
apiVersion: v1
kind: Secret
metadata:
  name: agri-smtp-secret
type: Opaque
stringData:
  host: "smtp.gmail.com"
  port: "587"
  username: "CHANGE_ME@gmail.com"
  password: "CHANGE_ME_APP_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: agri-payment-secrets
type: Opaque
stringData:
  konnect-api-key: "CHANGE_ME_KONNECT_API_KEY"
  stripe-api-key: "CHANGE_ME_STRIPE_API_KEY"
