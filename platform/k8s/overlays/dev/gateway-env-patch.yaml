apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  template:
    spec:
      containers:
        - name: gateway
          env:
            - name: AUTH_SERVICE_URI
              value: "http://dev-auth-service:8087"
            - name: CATALOG_SERVICE_URI
              value: "http://dev-catalog-service:8080"
            - name: ORDER_SERVICE_URI
              value: "http://dev-order-service:8080"
            - name: PAYMENT_SERVICE_URI
              value: "http://dev-payment-service:8080"
            - name: MESSAGING_SERVICE_URI
              value: "http://dev-messaging-service:8080"
            - name: DELIVERY_SERVICE_URI
              value: "http://dev-delivery-service:8086"
            - name: JOBS_SERVICE_URI
              value: "http://dev-jobs-service:8080"
            - name: USER_SERVICE_URI
              value: "http://dev-user-service:8088"
