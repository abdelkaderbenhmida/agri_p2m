server:
  port: 8080

spring:
  application:
    name: messaging-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/msgdb}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  jwtSecret: ${JWT_SECRET:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2}
  jwtExpirationMs: 86400000
